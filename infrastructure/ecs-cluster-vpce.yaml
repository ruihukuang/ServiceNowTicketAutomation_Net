AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with VPC Endpoints'

Parameters:
  EnvironmentName:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetIds:
    Type: CommaDelimitedList
  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: 'ECS Security Group ID from VPC stack'
  PrivateRouteTableId:
    Type: String  # CHANGED: Use String type instead
    Description: 'Private Route Table ID from VPC stack (e.g., rtb-xxxxxx)'
    AllowedPattern: '^rtb-[a-z0-9]{8,17}$'  # ADDED: Validation pattern
    ConstraintDescription: 'Must be a valid Route Table ID (rtb-xxxxxx)'

  
Resources:

  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-cluster
      CapacityProviders:
        - FARGATE
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Network
          Value: private-vpce

  # VPC Endpoints (关键！ECS通过这些端点访问AWS服务) (Critical for Private Network Connectivity)

  # 1. ECR API Endpoint (用于认证)
  ECREndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api  # ServiceName 参数指定要为哪个AWS服务创建VPC端点
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup # 修改为引用参数
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ecr-api-endpoint

  # 2. ECR DKR Endpoint (用于拉取镜像)
  ECRDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr  # CORRECT
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup # 修改为引用参数
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ecr-dkr-endpoint

  # 3. S3 Gateway Endpoint (ECR镜像层存储在S3) (Image Layer Storage)
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableId  # 修改为引用参数
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-s3-endpoint

  # 4. CloudWatch Logs Endpoint
  CloudWatchEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup # 修改为引用参数
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-cloudwatch-endpoint

  # 5. Secrets Manager Endpoint
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup  # 修改为引用参数
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-secretsmanager-endpoint

# 6. STS Endpoint (Highly Recommended for Fargate Task Credentials)
  STSEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.sts
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-sts-endpoint

  # 6. SSM Endpoint (可选，用于调试)
  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ssm
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EVPCEndpointSecurityGroup  # 修改为引用参数
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ssm-endpoint


  VPCEndpointSecurityGroup: #VPC端点安全组需要允许来自ECS安全组的入站流量。如果使用同一个安全组（ECSSecurityGroupId），会出现循环依赖和连接问题。
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC endpoints
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - Description: From ECS to VPC endpoints
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ECSSecurityGroupId       # 允许来自ECS安全组的HTTPS流量 # 用于: ECR API, ECR DKR, CloudWatch Logs,  Secrets Manager, STS, SSM, KMS
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpcendpoint-sg
      # 2. S3网关端点不需要这里配置！
      # S3是网关端点，通过路由表和端点策略控制
      # 不需要安全组规则
    
      # VPC端点出站 - 通常不需要

Outputs:
  ClusterName:
    Description: 'ECS Cluster Name'
    Value: !Ref ECSCluster
  
  VpcEndpointIds:
    Description: 'VPC Endpoint IDs'
    Value: !Join [',', [
      !Ref ECREndpoint,
      !Ref ECRDkrEndpoint,
      !Ref S3Endpoint,
      !Ref CloudWatchEndpoint,
      !Ref SecretsManagerEndpoint,
      !Ref STSEndpoint # Added to Outputs
    ]]
  
  ECREndpointId:
    Description: 'ECR API VPC Endpoint ID'
    Value: !Ref ECREndpoint
    
  ECRDkrEndpointId:
    Description: 'ECR Docker VPC Endpoint ID'
    Value: !Ref ECRDkrEndpoint
    
  S3EndpointId:
    Description: 'S3 VPC Endpoint ID'
    Value: !Ref S3Endpoint
    
  CloudWatchEndpointId:
    Description: 'CloudWatch Logs VPC Endpoint ID'
    Value: !Ref CloudWatchEndpoint
    
  SecretsManagerEndpointId:
    Description: 'Secrets Manager VPC Endpoint ID'
    Value: !Ref SecretsManagerEndpoint
    
  STSEndpointId:
    Description: 'STS VPC Endpoint ID'
    Value: !Ref STSEndpoint

  ECREndpointDNS:
    Description: 'ECR API Endpoint Private DNS'
    Value: !Sub
      - ${DnsName}
      - DnsName: !Select [0, !GetAtt ECREndpoint.DnsEntries]
  

